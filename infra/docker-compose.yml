services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-sinnlos}
      POSTGRES_USER: ${DATABASE_USERNAME:-sinnlos}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-sinnlos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    security_opt:
      - no-new-privileges:true

  cms:
    build:
      context: ..
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 1337
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-sinnlos}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-sinnlos}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
      PUBLIC_URL: ${CMS_PUBLIC_URL}
      CORS_ORIGIN: ${WEB_PUBLIC_URL}
      MS_CLIENT_ID: ${MS_CLIENT_ID}
      MS_CLIENT_SECRET: ${MS_CLIENT_SECRET}
      MS_TENANT_ID: ${MS_TENANT_ID}
      LOCAL_REGISTRATION: ${LOCAL_REGISTRATION:-0}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-0}
      # Admin seed — auto-create first Strapi admin on fresh database
      STRAPI_ADMIN_EMAIL: ${STRAPI_ADMIN_EMAIL:-}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD:-}
      # Revalidation webhook → Next.js
      WEB_INTERNAL_URL: http://web:3000
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    volumes:
      - cms_uploads:/app/apps/cms/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1337/_health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 512
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      cms:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      STRAPI_URL: http://cms:1337
      STRAPI_PUBLIC_URL: ${CMS_PUBLIC_URL}
      NEXT_PUBLIC_APP_URL: ${WEB_PUBLIC_URL}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Sinnlos Intranet}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${WEB_PUBLIC_URL}
      AUTH_TRUST_HOST: "true"
      # Default UI language (en or de); users can override in their profile
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      # Standalone mode: enable local credentials alongside Microsoft
      AUTH_LOCAL_ENABLED: ${AUTH_LOCAL_ENABLED:-0}
      # Standalone mode: enable the self-registration form (default off)
      LOCAL_REGISTRATION: ${LOCAL_REGISTRATION:-0}
      # Admin seed — auto-create first Strapi admin on fresh database
      STRAPI_ADMIN_EMAIL: ${STRAPI_ADMIN_EMAIL:-}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD:-}
      AUTH_MICROSOFT_ENTRA_ID_ID: ${MS_CLIENT_ID}
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ${MS_CLIENT_SECRET}
      AUTH_MICROSOFT_ENTRA_ID_ISSUER: https://login.microsoftonline.com/${MS_TENANT_ID}/v2.0
      # Shared secret for the /api/revalidate webhook called from the CMS
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - cms
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  cms_uploads:
  caddy_data:
  caddy_config:
